<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Primitive examples</title>
</head>
<body>
    <script>
        //object
        let persion={
            name:"john",
            age: 30,
            isActive:true,
        };
        console.log(persion.name);
        console.log(persion.age);
        console.log(persion.isActive);
        persion.age=35;
        console.log(persion.age);
        //array
        let fruits=["apple","mango","cherry"];
        console.log(fruits[0]);
        console.log(fruits.length);
        console.log(fruits);
        fruits.push("orange");
        console.log(fruits);
        //function
        function nonExa(name){
            return `Hellow, ${name}`;

        }
        console.log(nonExa("alice"));
    </script>
    
</body>
</html>
